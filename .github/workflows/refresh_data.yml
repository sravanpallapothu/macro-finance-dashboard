# .github/workflows/refresh_data.yml
#
# Runs daily at 7pm IST (1:30pm UTC).
# 1. Fetches all four Google Sheet tabs as CSV → data/daily.csv etc.
# 2. Runs rbi_wss_updater.py → appends new rows to data/rbi_weekly.csv
# 3. Commits all changed files back to the repo.
#
# The dashboard HTML reads these local files — instant load, no CORS.
#
# PERMISSIONS: Settings → Actions → General → Workflow permissions
#              → Read and write permissions

name: Refresh Dashboard Data

on:
  schedule:
    - cron: "30 13 * * *"   # 1:30pm UTC = 7:00pm IST daily
  workflow_dispatch:         # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create data directory
        run: mkdir -p data

      # ── Step 1: Fetch Google Sheet tabs ──────────────────────
      - name: Download DailyData CSV
        run: |
          curl -sL -o data/daily.csv \
            "https://docs.google.com/spreadsheets/d/1hqzZzeVsyYinxSQ_pjinKBhnKC7XR76X3XHWVo_DgaU/export?format=csv&gid=1210776088"
          echo "Daily: $(wc -l < data/daily.csv) rows"

      - name: Download WeeklyData CSV
        run: |
          curl -sL -o data/weekly.csv \
            "https://docs.google.com/spreadsheets/d/1hqzZzeVsyYinxSQ_pjinKBhnKC7XR76X3XHWVo_DgaU/export?format=csv&gid=562712552"
          echo "Weekly: $(wc -l < data/weekly.csv) rows"

      - name: Download MonthlyData CSV
        run: |
          curl -sL -o data/monthly.csv \
            "https://docs.google.com/spreadsheets/d/1hqzZzeVsyYinxSQ_pjinKBhnKC7XR76X3XHWVo_DgaU/export?format=csv&gid=1304710388"
          echo "Monthly: $(wc -l < data/monthly.csv) rows"

      - name: Download QuarterlyData CSV
        run: |
          curl -sL -o data/quarterly.csv \
            "https://docs.google.com/spreadsheets/d/1hqzZzeVsyYinxSQ_pjinKBhnKC7XR76X3XHWVo_DgaU/export?format=csv&gid=1915292222"
          echo "Quarterly: $(wc -l < data/quarterly.csv) rows"

      # ── Step 2: Run RBI WSS scraper ───────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run RBI WSS updater
        run: python rbi_wss_updater.py

      # ── Step 3: Commit all updated data files ─────────────────
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Auto-refresh data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
